<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Silver Package</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-user-select:none;
user-select:none;
}

body{
font-family:Arial, sans-serif;
background:#f4f4f4;
text-align:center;
padding:20px;
}

/* Main Container */

.container{
max-width:1000px;
margin:auto;
background:#ffffff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

/* Image */

.container img{
width:100%;
height:auto;
border-radius:8px;
pointer-events:none;
}

/* Heading */

h1{
margin-top:20px;
font-size:32px;
color:#444;
letter-spacing:1px;
}

/* Paragraph */

p{
margin-top:15px;
font-size:18px;
line-height:1.7;
color:#222;
}

/* Note */

.note{
margin-top:20px;
font-size:16px;
color:#000;
font-weight:bold;
}

</style>

</head>

<body oncontextmenu="return false;">

<div class="container">

<img src="https://statics.mylandingpages.co/static/aaanxdmf26c522mp/image/600e9f59166b4a0591ad427cc66e9ed2.webp">

<h1>SILVER PACKAGE</h1>

<p>
इस प्लान के अंतर्गत आपकी हर पोस्ट/वीडियो पर लगभग 
<strong>50 Indian Likes</strong> और लगभग 
<strong>1000 Views</strong> प्राप्त होंगे, जिससे आपकी पोस्ट की रीच और एंगेजमेंट बेहतर होगी और आपका प्रोफाइल अधिक सक्रिय दिखाई देगा।
</p>

<p class="note">
नोट: यह एक अनुमानित संख्या है, जो पोस्ट के प्रकार और समय के अनुसार थोड़ा ऊपर-नीचे हो सकती है।
</p>

</div>

<script>

/* Disable Copy */
document.addEventListener("copy",function(e){
e.preventDefault();
});

/* Disable Keyboard Shortcuts */

document.onkeydown=function(e){
if(e.ctrlKey && (e.key==='c' || e.key==='u' || e.key==='s' || e.key==='a')){
return false;
}
}

</script>

</body>
</html>
